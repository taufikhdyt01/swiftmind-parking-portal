# Swiftmind Parking Violation Portal — local orchestration.
# Phase 0: supporting infrastructure only. Application services are added in later phases.
name: swiftmind

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swiftmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiftmind}
      POSTGRES_DB: ${POSTGRES_DB:-swiftmind}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swiftmind}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-swiftmind}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-swiftmind}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"      # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-swiftmind}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-swiftmind123}
    ports:
      - "${MINIO_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Application services ---

  identity:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: identity
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-swiftmind}:${POSTGRES_PASSWORD:-swiftmind}@postgres:5432/${POSTGRES_DB:-swiftmind}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ISSUER: ${JWT_ISSUER:-swiftmind}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-24h}
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: gateway
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ISSUER: ${JWT_ISSUER:-swiftmind}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-24h}
      IDENTITY_URL: http://identity:8081
      RULES_URL: http://rules:8082
      VIOLATION_URL: http://violation:8083
      PAYMENT_URL: http://payment:8084
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:3000}
      PORT: "8080"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      - identity
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  minio_data:
