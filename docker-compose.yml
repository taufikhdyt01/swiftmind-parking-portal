# ParkWatch Parking Violation Portal — local orchestration.
# Phase 0: supporting infrastructure only. Application services are added in later phases.
name: parkwatch

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parkwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkwatch}
      POSTGRES_DB: ${POSTGRES_DB:-parkwatch}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parkwatch}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-parkwatch}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-parkwatch}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"      # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # management UI
    # No persistent volume: on Docker Desktop (Windows) a named volume can give
    # the broker an unreadable .erlang.cookie (eacces). Queues/exchange are
    # durable-by-declaration and re-created by services on startup, so losing the
    # data dir across restarts is fine for this stack.
    healthcheck:
      # rabbitmq-diagnostics spins up an Erlang VM and can exceed a tight timeout
      # under CPU contention, causing false "unhealthy" flaps — keep it generous.
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-parkwatch}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-parkwatch123}
    ports:
      - "${MINIO_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Application services ---

  identity:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: identity
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-parkwatch}:${POSTGRES_PASSWORD:-parkwatch}@postgres:5432/${POSTGRES_DB:-parkwatch}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ISSUER: ${JWT_ISSUER:-parkwatch}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-24h}
      PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  rules:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: rules
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-parkwatch}:${POSTGRES_PASSWORD:-parkwatch}@postgres:5432/${POSTGRES_DB:-parkwatch}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      PORT: "8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  violation:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: violation
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-parkwatch}:${POSTGRES_PASSWORD:-parkwatch}@postgres:5432/${POSTGRES_DB:-parkwatch}?sslmode=disable
      RULES_URL: http://rules:8082
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-parkwatch}:${RABBITMQ_PASSWORD:-parkwatch}@rabbitmq:5672/
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-parkwatch}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-parkwatch123}
      MINIO_BUCKET: ${MINIO_BUCKET:-violation-photos}
      PORT: "8083"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      rules:
        condition: service_started
    restart: unless-stopped

  payment:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: payment
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-parkwatch}:${POSTGRES_PASSWORD:-parkwatch}@postgres:5432/${POSTGRES_DB:-parkwatch}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-parkwatch}:${RABBITMQ_PASSWORD:-parkwatch}@rabbitmq:5672/
      PORT: "8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: unless-stopped

  notification:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: notification
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-parkwatch}:${POSTGRES_PASSWORD:-parkwatch}@postgres:5432/${POSTGRES_DB:-parkwatch}?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-parkwatch}:${RABBITMQ_PASSWORD:-parkwatch}@rabbitmq:5672/
      PORT: "8085"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: build/Dockerfile
      args:
        SERVICE: gateway
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ISSUER: ${JWT_ISSUER:-parkwatch}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-24h}
      IDENTITY_URL: http://identity:8081
      RULES_URL: http://rules:8082
      VIOLATION_URL: http://violation:8083
      PAYMENT_URL: http://payment:8084
      NOTIFICATION_URL: http://notification:8085
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:3000}
      PORT: "8080"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      - identity
      - rules
      - violation
      - payment
      - notification
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
